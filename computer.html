<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📓 窗邊的多肉回憶錄 🌿</title>
  
  <style>
    /* ==========================================
       🧱 1. 空間透視與環境基礎設定
       ========================================== */
    body {
      margin: 0; padding: 0;
      background-color: #ede6dc; /* 溫暖的繪本感底色 */
      font-family: 'Microsoft JhengHei', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #4a3e3d;
      overflow: hidden;
    }

    /* 遊戲主舞台：呈現你草稿中的立體房間角落 */
    .game-stage {
      position: relative;
      width: 95%;
      max-width: 800px;
      height: 500px;
      background-color: #f7f3ed;
      border: 5px solid #4a3e3d;
      border-radius: 28px;
      box-shadow: 0 25px 60px rgba(74, 62, 61, 0.2);
      overflow: hidden;
    }

    /* 3D 房間容器 */
    .room-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* ==========================================
       🌅 左側牆面層：有深度的窗戶、天色與黃色窗台
       ========================================== */
    .left-wall {
      position: absolute;
      top: 0; left: 0;
      width: 65%; height: 100%;
      border-right: 3px solid rgba(74, 62, 61, 0.15); /* 牆角陰影線 */
      box-sizing: border-box;
    }

    /* 窗外動態天色 (z-index: 1) */
    .window-view {
      position: absolute;
      top: 10%; left: 10%; width: 80%; height: 50%;
      border: 4px solid #4a3e3d;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(to bottom, #9bc2ff, #ffffff);
      transition: background 3s ease;
    }

    /* 晚上亮起的一閃一閃星星 */
    .stars {
      position: absolute;
      width: 100%; height: 100%;
      background-image: radial-gradient(circle, #fff 1.5px, transparent 1.5px);
      background-size: 30px 30px;
      opacity: 0;
      transition: opacity 3s ease;
    }

    /* 隨風飄動的透明窗簾圖片 (預設用占位圖，可換成你的手繪 PNG) */
    .curtain-asset {
      position: absolute;
      top: 0; width: 30%; height: 100%;
      background-color: rgba(255, 255, 255, 0.4);
      border: 1px dashed #4a3e3d; /* 手繪風虛線邊框 */
      transform-origin: top center;
      animation: windSway 6s ease-in-out infinite alternate;
    }
    .curtain-left { left: 0; }
    .curtain-right { right: 0; animation-delay: -3s; }

    @keyframes windSway {
      0% { transform: rotate(-2deg); }
      100% { transform: rotate(3deg); }
    }

    /* ✨ 呼應草稿：黃色的多肉擺放窗台/平台 */
    .window-ledge {
      position: absolute;
      bottom: 12%; left: 5%; width: 90%; height: 20%;
      background-color: #f4c430; /* 草稿中的黃色暖調平台 */
      border: 4px solid #4a3e3d;
      border-radius: 12px;
      box-shadow: 0 8px 0px rgba(74, 62, 61, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🎯 植物主體：改用圖片標籤，徹底告別青江菜！ */
    .succulent-image {
      position: absolute;
      bottom: 85%; /* 讓它完美站立在黃色窗台上 */
      width: 110px; /* 根據圖片精緻度調整大小 */
      height: auto;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
    }
    .succulent-image:active {
      transform: scale(1.1) rotate(3deg); /* 點擊時會有極高質感的彈跳感 */
    }

    /* ==========================================
       🪵 右側牆面層：裝飾與你的「靈魂書櫃」
       ========================================== */
    .right-wall {
      position: absolute;
      top: 0; right: 0;
      width: 35%; height: 100%;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
    }

    /* 牆面上的 Some 裝飾 */
    .some-decor {
      border: 3px solid #4a3e3d;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: bold;
      background: #fff;
      transform: rotate(-2deg);
    }

    /* ✨ 呼應草稿：立體互動書櫃 (點擊翻閱死去植物歷史) */
    .bookcase-container {
      width: 90%;
      height: 60%;
      background-color: #d4a373; /* 精緻木質色 */
      border: 4px solid #4a3e3d;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      box-shadow: -8px 8px 0px rgba(74, 62, 61, 0.1);
      transition: all 0.3s ease;
    }
    .bookcase-container:hover {
      transform: translate(2px, -2px);
      box-shadow: -10px 10px 0px rgba(74, 62, 61, 0.15);
      background-color: #c59262;
    }
    
    /* 書櫃內擺放的微型書籍裝飾線條 */
    .books-line {
      width: 80%; height: 12px;
      background: #4a3e3d; margin: 8px 0; border-radius: 4px;
    }

    /* ==========================================
       💬 頂部狀態與療癒對話框
       ========================================== */
    .hud-display {
      position: absolute;
      top: 15px; left: 15px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 16px;
      border: 3px solid #4a3e3d;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .dialogue-bubble {
      position: absolute;
      bottom: 20px; left: 5%; width: 55%;
      background: white;
      border: 3px solid #4a3e3d;
      border-radius: 16px;
      padding: 12px;
      font-size: 0.9rem;
      font-style: italic;
      box-shadow: 0 6px 12px rgba(0,0,0,0.05);
      z-index: 10;
    }

    /* ==========================================
       📖 歷史回憶錄彈窗 (點擊書櫃開啟)
       ========================================== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(74, 62, 61, 0.5);
      backdrop-filter: blur(5px);
      display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
      z-index: 100;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    
    .modal-content {
      background: #fffcf7;
      border: 5px solid #4a3e3d;
      border-radius: 24px;
      width: 85%; max-width: 450px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .history-scroll {
      max-height: 250px; overflow-y: auto;
      margin: 15px 0; padding-right: 5px;
      text-align: left;
    }
    .history-item {
      padding: 10px; border-bottom: 2px dashed #d9cebc;
    }
    .close-btn {
      background: #4a3e3d; color: white; border: none;
      padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="game-stage">
    
    <div class="hud-display" id="hud-text">
      ❤️ 壽命值: 100% | 💖 親密度: 0/100
    </div>

    <div class="room-container">
      
      <div class="left-wall">
        <div class="window-view" id="window-sky">
          <div class="stars" id="night-stars"></div>
          <div class="curtain-asset curtain-left"></div>
          <div class="curtain-asset curtain-right"></div>
        </div>

        <div class="window-ledge">
          <img src="https://picsum.photos/id/106/200/200" class="succulent-image" id="succulent-img" alt="多肉植物">
        </div>
      </div>

      <div class="right-wall">
        <div class="some-decor">🖼️ Some 裝飾</div>

        <div class="bookcase-container" id="bookcase-btn">
          <span>📚 書櫃</span>
          <div class="books-line"></div>
          <div class="books-line"></div>
          <span style="font-size: 0.75rem; color: #7a6e67;">(點擊翻閱歷史回憶)</span>
        </div>
      </div>

    </div>

    <div class="dialogue-bubble" id="dialogue-box">
      「白天到了，微風輕輕吹過窗簾。點擊多肉來細心澆水照顧它吧。」
    </div>

  </div>

  <div class="modal-overlay" id="history-modal">
    <div class="modal-content">
      <h3 style="margin-top:0; text-align: center;">📖 書櫃深處的植物回憶錄</h3>
      <div class="history-scroll" id="history-list">
        </div>
      <div style="text-align: center;">
        <button class="close-btn" id="close-modal-btn">闔上回憶</button>
      </div>
    </div>
  </div>

  <script>
    const windowSky = document.getElementById('window-sky');
    const nightStars = document.getElementById('night-stars');
    const succulentImg = document.getElementById('succulent-img');
    const hudText = document.getElementById('hud-text');
    const dialogueBox = document.getElementById('dialogue-box');
    
    const historyModal = document.getElementById('history-modal');
    const bookcaseBtn = document.getElementById('bookcase-btn');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const historyList = document.getElementById('history-list');

    // 遊戲核心數據庫
    let plantLife = 100;       // 壽命值 (100 -> 0)
    let lovePoints = 0;        // 親密度 (0 -> 100)
    let currentStage = 1;      // 階段 (1:幼苗, 2:成長, 3:繁茂, 4:開花)
    let isDead = false;

    // 從記憶體中讀取死去的植物歷史日記
    let graveyard = JSON.parse(localStorage.getItem('succulent_graveyard_v2')) || [];

    // 🎯 圖片資源庫：【這裡就是換掉青江菜的關鍵！】
    // 當你有了精緻的手繪多肉圖片網址後，直接貼進來蓋掉這些預設網址，效果就會非常完美！
    const succulentImages = {
      1: "https://picsum.photos/id/106/200/200", // 階段 1 幼苗圖
      2: "https://picsum.photos/id/324/200/200", // 階段 2 成長圖
      3: "https://picsum.photos/id/365/200/200", // 階段 3 繁茂圖
      4: "https://picsum.photos/id/305/200/200", // 階段 4 精緻開花圖
      dead: "https://picsum.photos/id/212/200/200" // ☠️ 死亡後留下的微小種子/枯萎圖
    };

    /* --- 1. 真實時間與環境天色連動 --- */
    function updateEnvironment() {
      const hour = new Date().getHours();
      
      if (hour >= 6 && hour < 17) {
        // 白天
        windowSky.style.background = "linear-gradient(to bottom, #9bc2ff, #ffffff)";
        nightStars.style.opacity = "0";
      } else if (hour >= 17 && hour < 19) {
        // 黃昏
        windowSky.style.background = "linear-gradient(to bottom, #f39c12, #f1c40f)";
        nightStars.style.opacity = "0";
      } else {
        // 夜晚
        windowSky.style.background = "linear-gradient(to bottom, #1a252f, #2c3e50)";
        nightStars.style.opacity = "0.8"; // 星星亮起
      }
    }

    /* --- 2. 更新 HUD 與狀態數據 --- */
    function renderStatus() {
      if (isDead) {
        hudText.innerHTML = "🕯️ 狀態: 這株多肉的生命已化作書櫃裡的故事。";
        succulentImg.src = succulentImages.dead;
        return;
      }
      
      hudText.innerHTML = `❤️ 壽命值: ${plantLife}% | 💖 親密度: ${lovePoints}/100 | 🌲 階段: ${currentStage}/4`;
      succulentImg.src = succulentImages[currentStage];
    }

    /* --- 3. 點擊植物：進行限量的溫馨照顧與生命週期控制 --- */
    succulentImg.addEventListener('click', () => {
      if (isDead) {
        dialogueBox.innerHTML = "「盆栽裡留下一顆小小的種子，它的故事已經被好好記錄在右邊的書櫃裡了。」";
        return;
      }

      const hour = new Date().getHours();
      // 夜晚防打擾限制
      if (hour >= 19 || hour < 6) {
        dialogueBox.innerHTML = "「月亮出來了，現在是夜晚。讓多肉好好休息吧，明天太陽升起再跟它玩。」";
        return;
      }

      // 增加親密度
      lovePoints += 20;
      dialogueBox.innerHTML = "「你輕輕幫它澆了點水，並把它挪到陽光最舒服的地方。親密度提升了！」";

      // 機制 A：親密度達到上限，換取延長壽命
      if (lovePoints >= 100) {
        lovePoints = 0;
        plantLife = Math.min(plantLife + 25, 100); // 延長 25% 壽命，最高 100%
        dialogueBox.innerHTML = "✨ 奇蹟發生了！你和多肉的親密度達到滿分，它的生命獲得了愛的延續（壽命延長）！";
        
        // 進化到下一階段
        if (currentStage < 4) {
          currentStage++;
        }
      }

      renderStatus();
    });

    /* --- 4. 壽命流逝機制 (每 15 秒模擬生命減少，逼近死亡週期，測試完可以改長) --- */
    function checkLifeCycle() {
      if (isDead) return;

      plantLife -= 5; // 壽命隨時間自然衰減
      
      if (plantLife <= 0) {
        plantLife = 0;
        isDead = true;
        
        // 🕯️ 觸發靈魂機制：將它化作回憶錄寫進書櫃
        const newMemory = {
          generation: graveyard.length + 1,
          date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString(),
          finalStage: currentStage === 4 ? "🌸 成功開花結果" : `🌿 成長至第 ${currentStage} 階段`,
          note: "它終究會離開，但窗外的風會記住它最美的模樣。"
        };
        
        graveyard.push(newMemory);
        localStorage.setItem('succulent_graveyard_v2', JSON.stringify(graveyard));
        
        dialogueBox.innerHTML = "🕯️ 這株多肉靜靜地結束了它的生命旅程。它的故事已經化作一本泛黃的日記，永久收藏在右側的書櫃上了。";
      }
      renderStatus();
    }

    /* --- 5. 書櫃互動：翻閱過往死去的植物日記 --- */
    bookcaseBtn.addEventListener('click', () => {
      historyList.innerHTML = ""; // 清空舊內容
      
      if (graveyard.length === 0) {
        historyList.innerHTML = "<p style='color:#888; text-align:center;'>書櫃上目前空空的。<br>當有植物生命走到盡頭時，回憶會自動珍藏在這裡。</p>";
      } else {
        // 反向排序，讓最新的回憶在最上面
        [...graveyard].reverse().forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `
            <p><b>📜【第 ${item.generation} 代多肉】</b></p>
            <p>📅 畢業時間: ${item.date}</p>
            <p>🌸 最終姿態: <span style="color:#e63946;">${item.finalStage}</span></p>
            <p style="font-size:0.85rem; color:#666; italic;">墓志銘: "${item.note}"</p>
          `;
          historyList.appendChild(div);
        });
      }
      
      historyModal.classList.add('open'); // 開啟書櫃彈窗
    });

    closeModalBtn.addEventListener('click', () => {
      historyModal.classList.remove('open');
    });

    // 6. 初始化啟動
    updateEnvironment();
    renderStatus();
    
    // 定時器
    setInterval(updateEnvironment, 60000); // 每分鐘同步一次天色
    setInterval(checkLifeCycle, 15000);    // 每 15 秒模擬生命衰老 (方便你測試死亡與書櫃功能)
  </script>
</body>
</html>
