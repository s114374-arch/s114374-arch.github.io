<!DOCTYPE html>

<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloomodoro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- 左側面板 -->

  <aside class="sidebar">

```
<h1>🌱 Bloomodoro</h1>

<div class="timer-card">

  <h2>番茄鐘</h2>

  <div id="timer">25:00</div>

  <button id="startBtn">
    開始專注
  </button>

  <button id="resetBtn">
    重置
  </button>

</div>

<div class="stats-card">
  <h3>今日完成</h3>
  <p id="completedPomodoro">0 次</p>
</div>
```

  </aside>

  <!-- 房間區 -->

  <main class="room-area">

```
<img
  src="assets/room.png"
  class="room-image"
  alt="room"
>

<div class="plant-section">

  <img
    id="plantImage"
    src="assets/plants/stage1.png"
    alt="plant"
  >

  <p id="plantStage">
    小嫩芽
  </p>

</div>
```

  </main>

  <!-- 百科 -->

  <aside class="encyclopedia">

```
<h2>植物百科</h2>

<h3>熊童子</h3>

<p>
  葉片像熊掌，
  表面有柔軟絨毛。
</p>

<p>
  成長進度：
  <span id="growthText">
  0 / 4
  </span>
</p>
```

  </aside>

</div>

<script src="script.js"></script>

</body>
</html>
