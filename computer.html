<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 窗邊的多肉植物觀測日記 🌸</title>
  
  <style>
    /* ==========================================
       🎨 全域基礎設定 (莫蘭迪療癒色系)
       ========================================== */
    body {
      margin: 0;
      padding: 0;
      background-color: #f0eae1; /* 溫柔的燕麥奶底色 */
      font-family: 'Microsoft JhengHei', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #5c5247;
    }

    /* 遊戲主場景：維持療癒的固定視窗比例 */
    .room-scene {
      position: relative;
      width: 90%;
      max-width: 600px;
      height: 450px;
      background-color: #ffffff;
      border: 6px solid #5c5247;
      border-radius: 24px;
      overflow: hidden; /* 確保窗簾、天空不會超出邊框 */
      box-shadow: 0 20px 50px rgba(92, 82, 71, 0.15);
    }

    /* ==========================================
       🌅 圖層 1：動態天空與星星層 (z-index: 1)
       ========================================== */
    .sky-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 70%; /* 窗戶看出去的天空範圍 */
      background: linear-gradient(to bottom, #b3d1ff, #ffffff); /* 預設白天藍天 */
      transition: background 3s ease; /* 天色轉換時要極度柔和 */
      z-index: 1;
    }

    /* 滿天星星 (夜晚才會經由 JS 控制透明度浮現) */
    .stars-container {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle, #ffffff 1px, transparent 1px),
        radial-gradient(circle, #ffffff 1.5px, transparent 1.5px);
      background-size: 40px 40px, 60px 60px;
      background-position: 0 0, 20px 30px;
      opacity: 0;
      transition: opacity 3s ease;
      animation: twinkle 4s infinite alternate; /* 星星微弱閃爍動畫 */
    }

    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 0.9; }
    }

    /* ==========================================
       🪟 圖層 2：窗框與隨風飄動的窗簾 (z-index: 2)
       ========================================== */
    .window-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 70%;
      border-bottom: 8px solid #c2b4a6; /* 木質窗台分界線 */
      box-sizing: border-box;
      z-index: 2;
    }

    /* 雪紡紗半透明窗簾 */
    .curtain {
      position: absolute;
      top: 0;
      width: 22%;
      height: 95%;
      background-color: rgba(255, 255, 255, 0.65);
      border-left: 1px solid rgba(230, 220, 210, 0.5);
      transform-origin: top center; /* 以頂部為支點擺動 */
      animation: windSway 5s ease-in-out infinite alternate; /* 輕柔的微風動畫 */
    }
    .left-curtain { left: 4%; }
    .right-curtain { right: 4%; animation-delay: -2.5s; /* 左右交錯擺動更自然 */ }

    @keyframes windSway {
      0% { transform: rotate(-1.5deg) skewX(-1.5deg); }
      100% { transform: rotate(2.5deg) skewX(2.5deg); }
    }

    /* ==========================================
       🪵 圖層 3：前景層 - 書桌與多肉植物 (z-index: 3)
       ========================================== */
    .foreground-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 32%;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    /* 木質書桌表面 */
    .desk-surface {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 85%;
      background-color: #f5eedf; /* 桌子木頭色 */
      border-top: 5px solid #d9cebc;
    }

    /* 多肉植物本體 */
    .succulent-pot {
      font-size: 5rem;
      z-index: 4;
      margin-bottom: 15px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    /* 點擊多肉時會觸發療癒的 Q 彈放大動畫 */
    .succulent-pot:active {
      transform: scale(1.15);
    }

    /* 飄浮提示泡泡 (顯示次數與狀態) */
    .status-bubble {
      position: absolute;
      top: -35px;
      background-color: #5c5247;
      color: #ffffff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      z-index: 5;
      pointer-events: none; /* 讓滑鼠點擊可以穿透泡泡點到植物 */
      transition: all 0.3s ease;
    }

    /* ==========================================
       📓 獨立 UI：右下角心情日記按鈕與彈窗
       ========================================== */
    .journal-btn {
      margin-top: 25px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      color: #5c5247;
      background-color: #ffffff;
      border: 3px solid #5c5247;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(92, 82, 71, 0.1);
      transition: transform 0.2s ease, background-color 0.2s ease;
    }
    .journal-btn:hover {
      transform: translateY(-3px);
      background-color: #fcfaf7;
    }

    /* 日記彈窗背景遮罩 */
    .journal-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(92, 82, 71, 0.4); /* 溫柔的深色遮罩 */
      backdrop-filter: blur(4px); /* 背景微微模糊，增加沉浸感 */
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 100;
    }
    /* 當日記被打開時切換此 Class */
    .journal-modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* 日記本內頁 */
    .journal-content {
      background-color: #fcfbf9;
      padding: 30px;
      border-radius: 24px;
      border: 4px solid #5c5247;
      width: 85%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      text-align: center;
    }
    .journal-content h3 {
      margin-top: 0;
      color: #5c5247;
    }
    .journal-content textarea {
      width: 100%;
      height: 160px;
      margin: 15px 0;
      padding: 12px;
      border: 2px solid #d9cebc;
      border-radius: 12px;
      background-color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      color: #5c5247;
      resize: none;
      box-sizing: border-box;
      outline: none;
    }
    .journal-content textarea:focus {
      border-color: #5c5247;
    }
    #close-journal-btn {
      padding: 8px 20px;
      background-color: #5c5247;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="room-scene">
    
    <div class="sky-layer" id="sky-bg">
      <div class="stars-container" id="stars"></div>
    </div>

    <div class="window-layer">
      <div class="curtain left-curtain"></div>
      <div class="curtain right-curtain"></div>
    </div>

    <div class="foreground-layer">
      <div class="desk-surface"></div>
      
      <div class="status-bubble" id="status-tip">🌱 點擊多肉開始照顧它</div>
      
      <div class="succulent-pot" id="plant-pot">🌱</div>
    </div>

  </div>

  <button class="journal-btn" id="open-journal-btn">📓 寫下今日心情隨筆</button>

  <div class="journal-modal" id="journal-modal">
    <div class="journal-content">
      <h3>📓 留白時間：心情日記</h3>
      <textarea id="journal-textarea" placeholder="今天過得怎麼樣？在這裡和多肉分享吧..."></textarea>
      <br>
      <button id="close-journal-btn">闔上日記</button>
    </div>
  </div>

  <script>
    // 1. 取得所有控制元件
    const skyBg = document.getElementById('sky-bg');
    const stars = document.getElementById('stars');
    const plantPot = document.getElementById('plant-pot');
    const statusTip = document.getElementById('status-tip');
    
    const journalModal = document.getElementById('journal-modal');
    const openJournalBtn = document.getElementById('open-journal-btn');
    const closeJournalBtn = document.getElementById('close-journal-btn');
    const journalTextarea = document.getElementById('journal-textarea');

    // 2. 核心培育狀態紀錄 (利用 localStorage 鎖定進度與天數)
    const todayStr = new Date().toLocaleDateString(); // 用字串記住今天日期 (例如 "2026/6/8")
    
    let currentStage = localStorage.getItem('plant_stage') ? parseInt(localStorage.getItem('plant_stage')) : 1;
    let lovePoints = localStorage.getItem('plant_love') ? parseInt(localStorage.getItem('plant_love')) : 0;
    
    // 【核心機制】：每日限制照顧 2 次，隔天會自動重置
    let dailyActionCount = 2;
    if (localStorage.getItem('last_action_date') === todayStr) {
      dailyActionCount = localStorage.getItem('daily_action_count') ? parseInt(localStorage.getItem('daily_action_count')) : 2;
    } else {
      // 發現是新的一天，自動重置次數
      localStorage.setItem('last_action_date', todayStr);
      localStorage.setItem('daily_action_count', 2);
    }

    // 階段與進化對應的型態
    const stageEmojis = {
      1: "🌱", // 害羞嫩芽
      2: "🌿", // 舒適小葉
      3: "🌵", // 元氣多肉
      4: "🌸", // 奇蹟開花
      5: "👑"  // 多肉守護神
    };

    /* --- 3. 時間天色連動系統 (串接真實電腦時間) --- */
    function syncTimeAndEnvironment() {
      const hour = new Date().getHours(); // 取得當前 0~23 小時
      
      if (hour >= 5 && hour < 10) {
        // 【清晨 05:00 - 09:59】 溫柔的橘粉色晨曦
        skyBg.style.background = "linear-gradient(to bottom, #ffc4a6, #ffffff)";
        stars.style.opacity = "0";
      } else if (hour >= 10 && hour < 16) {
        // 【白天 10:00 - 15:59】 清透的暖蔚藍天空
        skyBg.style.background = "linear-gradient(to bottom, #99c2ff, #ffffff)";
        stars.style.opacity = "0";
      } else if (hour >= 16 && hour < 19) {
        // 【黃昏 16:00 - 18:59】 夢幻的魔幻紫霞夕陽
        skyBg.style.background = "linear-gradient(to bottom, #cc80ff, #ffe6cc)";
        stars.style.opacity = "0";
      } else {
        // 【夜晚 19:00 - 04:59】 深邃靜謐夜空，繁星浮現
        skyBg.style.background = "linear-gradient(to bottom, #0d1321, #24304a)";
        stars.style.opacity = "0.8"; 
      }
      
      // 更新泡泡裡的文字提示
      updateStatusBubbleText();
    }

    /* --- 4. 狀態泡泡文字邏輯 --- */
    function updateStatusBubbleText() {
      const hour = new Date().getHours();
      
      // 如果是深夜 (晚上 7 點到清晨 5 點)
      if (hour >= 19 || hour < 5) {
        statusTip.innerHTML = "🌙 太陽下山了，多肉和星星已經休息了。";
        statusTip.style.backgroundColor = "#323c4d";
      } else {
        // 白天狀態：顯示剩餘次數
        if (dailyActionCount > 0) {
          statusTip.innerHTML = `💧 點擊澆水曬太陽 (今天還可照顧 ${dailyActionCount} 次)`;
          statusTip.style.backgroundColor = "#5c5247";
        } else {
          statusTip.innerHTML = "✨ 今天多肉已經喝飽曬足了，明天再來吧。";
          statusTip.style.backgroundColor = "#8c8275";
        }
      }
      
      // 更新植物型態
      plantPot.innerHTML = stageEmojis[currentStage] || "🌱";
    }

    /* --- 5. 點擊植物：進行每日限量的培育儀式 --- */
    plantPot.addEventListener('click', () => {
      const hour = new Date().getHours();
      
      // 檢查一：夜晚防打擾機制
      if (hour >= 19 || hour < 5) {
        statusTip.innerHTML = "💤 噓... 明天太陽升起時再照顧它吧。";
        return;
      }

      // 檢查二：每日次數檢查
      if (dailyActionCount > 0) {
        dailyActionCount--;
        lovePoints += 15; // 每次照顧增加親密度
        
        // 儲存狀態
        localStorage.setItem('daily_action_count', dailyActionCount);
        localStorage.setItem('plant_love', lovePoints);

        // 判定進化邏輯 (每 30 點親密度升一級)
        if (lovePoints >= currentStage * 30 && currentStage < 5) {
          currentStage++;
          localStorage.setItem('plant_stage', currentStage);
          statusTip.innerHTML = "✨ 太棒了！在你的陪伴下多肉進化了！";
          plantPot.innerHTML = stageEmojis[currentStage];
          return;
        }

        statusTip.innerHTML = `💧 泥土變濕潤了！今天還能照顧 ${dailyActionCount} 次`;
      } else {
        statusTip.innerHTML = "❌ 照顧過度植物會淹死喔，明天再來吧。";
      }
    });

    /* --- 6. 獨立心情日記控制功能 --- */
    // 從記憶體讀取玩家之前寫過的日記內容，幫他填進去
    if (localStorage.getItem('succulent_journal')) {
      journalTextarea.value = localStorage.getItem('succulent_journal');
    }

    openJournalBtn.addEventListener('click', () => {
      journalModal.classList.add('open'); // 優雅淡入日記本
    });

    closeJournalBtn.addEventListener('click', () => {
      // 點擊合上時，默默把玩家的心情儲存起來
      localStorage.setItem('succulent_journal', journalTextarea.value);
      journalModal.classList.remove('open'); // 淡出日記本
      
      // 給個療癒的小反饋
      statusTip.innerHTML = "📓 謝謝你願意把心情分享給多肉聽。";
    });

    // 7. 初始化啟動
    syncTimeAndEnvironment();
    // 每隔 30 秒後端靜默檢查一次時間，確保天色隨時精準連動
    setInterval(syncTimeAndEnvironment, 30000);

  </script>
</body>
</html>
