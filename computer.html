<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 像素窗邊：多肉微縮世界 📓</title>
  
  <style>
    /* ==========================================
       🎨 1. 全螢幕滿版與像素風渲染優化
       ========================================== */
    * {
      box-sizing: border-box;
      /* 確保所有像素圖片在放大時邊緣依然清晰、不模糊 */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background-color: #dbc9b5; /* 溫暖的復古大地色底色 */
      font-family: 'Courier New', 'Microsoft JhengHei', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🎮 核心：全螢幕立體遊戲舞台 */
    .game-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 📦 2D 像素空間主體（鎖定 16:9 比例，確保在任何螢幕上都不會變形） */
    .space-container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      height: 100%;
      max-height: 562px;
      /* 🎯 這裡換上你最滿意的「全螢幕立體空間像素大底圖」 */
      background-image: url('https://i.imgur.com/vHq47fS.gif'); 
      background-size: cover;
      background-position: center;
      border: 6px solid #4a382c;
      box-shadow: 0 30px 70px rgba(0,0,0,0.3);
    }

    /* ==========================================
       🎯 2. 精準定位互動層 (物件在空間中的絕對座標)
       ========================================== */
    
    /* 🌿 植物專屬位置：讓他完美站在像素大圖中的黃色窗台/桌面上 */
    .succulent-slot {
      position: absolute;
      bottom: 30%; /* 垂直座標（可依最終大圖微調） */
      left: 32%;   /* 水平座標 */
      width: 120px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 10;
    }

    .succulent-img {
      width: 100%;
      height: auto;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    /* 點擊多肉時會有像素遊戲特有的 Q 彈縮放感 */
    .succulent-img:active {
      transform: scale(1.2) translateY(-5px);
    }

    /* 📚 書櫃隱形互動區域：直接疊在大圖右側的書櫃位置 */
    .bookcase-hotspot {
      position: absolute;
      top: 15%;
      right: 12%;
      width: 140px;
      height: 280px;
      cursor: pointer;
      z-index: 5;
      /* 開發測試時可以把 background 改成 rgba 來看位置，正式運作時保持透明 */
      background: rgba(255, 255, 255, 0); 
      border-radius: 8px;
    }
    .bookcase-hotspot:hover {
      background: rgba(255, 255, 255, 0.08); /* 游標移上去時微微發光提示 */
    }

    /* ==========================================
       💬 3. 2D UI 疊加圖層 (浮在遊戲畫面最上方)
       ========================================== */
    .hud-panel {
      position: absolute;
      top: 25px; left: 25px;
      background: #fff8f0;
      border: 4px solid #4a382c;
      padding: 10px 20px;
      font-weight: bold;
      font-size: 0.95rem;
      box-shadow: 5px 5px 0px #4a382c;
      z-index: 50;
    }

    .dialogue-box {
      position: absolute;
      bottom: 25px; left: 25px; right: 25px;
      background: #fff8f0;
      border: 4px solid #4a382c;
      padding: 16px;
      font-size: 1.05rem;
      font-style: italic;
      box-shadow: 5px 5px 0px #4a382c;
      z-index: 50;
    }

    /* ==========================================
       📖 4. 歷史日記本彈窗介面
       ========================================== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(74, 56, 44, 0.6);
      display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      z-index: 100;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    
    .modal-box {
      background: #fff8f0;
      border: 5px solid #4a382c;
      width: 90%; max-width: 450px;
      padding: 25px;
      text-align: center;
      box-shadow: 10px 10px 0px #4a382c;
    }
    .history-scroll {
      max-height: 240px; overflow-y: auto;
      margin: 15px 0; padding-right: 5px;
      border-top: 2px dashed #4a382c;
      text-align: left;
    }
    .history-card { padding: 12px 0; border-bottom: 2px dashed #bc8a5f; }
    .close-btn {
      background: #4a382c; color: white; border: none;
      padding: 8px 24px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="game-screen">
    
    <div class="hud-panel" id="hud-text">
      ❤️ 壽命值: 100% | 💖 親密度: 0/100 | 🌸 世代: 第 1 代
    </div>

    <div class="space-container">
      
      <div class="succulent-slot">
        <img src="https://i.imgur.com/gK23wWw.png" class="succulent-img" id="succulent-img" alt="像素多肉">
      </div>

      <div class="bookcase-hotspot" id="bookcase-btn" title="翻閱歷史回憶錄"></div>

    </div>

    <div class="dialogue-box" id="dialogue-box">
      「微微的風吹進了等角像素房間。點擊多肉植物，在每天有限的次數內給予它溫暖的陪伴吧。」
    </div>

  </div>

  <div class="modal-overlay" id="history-modal">
    <div class="modal-box">
      <h3 style="margin-top: 0; color: #4a382c;">📖 書櫃深處的像素多肉回憶錄</h3>
      <div class="history-scroll" id="history-list">
        </div>
      <button class="close-btn" id="close-modal-btn">闔上日記</button>
    </div>
  </div>

  <script>
    const succulentImg = document.getElementById('succulent-img');
    const hudText = document.getElementById('hud-text');
    const dialogueBox = document.getElementById('dialogue-box');
    
    const historyModal = document.getElementById('history-modal');
    const bookcaseBtn = document.getElementById('bookcase-btn');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const historyList = document.getElementById('history-list');

    // 培育核心數據
    let plantLife = 100;
    let lovePoints = 0;
    let currentStage = 1;
    let isDead = false;

    // 從瀏覽器快取讀取死去的植物歷史
    let graveyard = JSON.parse(localStorage.getItem('pro_pixel_graveyard')) || [];

    // 🎯 正確、精緻的去背像素風多肉生長連續圖網址
    const pixelSucculentAssets = {
      1: "https://i.imgur.com/gK23wWw.png", // 階段 1：像素嫩芽
      2: "https://i.imgur.com/K3y7K9V.png", // 階段 2：肥厚小葉片
      3: "https://i.imgur.com/fMvOidC.png", // 階段 3：群生繁茂
      4: "https://i.imgur.com/M6Lw1O3.png", // 階段 4：頂端綻放精緻粉紅小花！
      dead: "https://i.imgur.com/f9SByM3.png" // ☠️ 枯萎狀態（留下一顆傳承的小種子）
    };

    function renderUI() {
      if (isDead) {
        hudText.innerHTML = `🕯️ 狀態: 生命已化作書櫃裡的故事 | ⏳ 世代: 第 ${graveyard.length + 1} 代`;
        succulentImg.src = pixelSucculentAssets.dead;
        return;
      }
      hudText.innerHTML = `❤️ 多肉壽命: ${plantLife}% | 💖 親密度: ${lovePoints}/100 | 🌲 階段: ${currentStage}/4`;
      succulentImg.src = pixelSucculentAssets[currentStage];
    }

    /* --- 互動照顧機制 --- */
    succulentImg.addEventListener('click', () => {
      if (isDead) {
        dialogueBox.innerHTML = "「花盆裡留下一顆微小的像素種子。點擊右側牆上的書櫃，翻閱它曾留下的故事吧。」";
        return;
      }

      const hour = new Date().getHours();
      // 夜晚防打擾機制 (晚上 7 點到清晨 6 點多肉會睡著)
      if (hour >= 19 || hour < 6) {
        dialogueBox.innerHTML = "「夜深了，像素房間也安靜了下來。多肉已經睡著了，明天太陽升起再跟它玩吧。」";
        return;
      }

      // 正常照顧
      lovePoints += 25;
      dialogueBox.innerHTML = "「你細心地為多肉移開了阻擋陽光的遮蔽。親密度上升了！」";

      // 親密度滿，延長壽命並進化
      if (lovePoints >= 100) {
        lovePoints = 0;
        plantLife = Math.min(plantLife + 35, 100); // 親密度換取延壽
        dialogueBox.innerHTML = "✨ 羈絆滿分！多肉感受到了你的溫柔陪伴，生命獲得了延續，外觀也產生了茁壯的蛻變！";
        if (currentStage < 4) currentStage++;
      }
      renderUI();
    });

    /* --- 生命自然流逝 (每 20 秒扣 5% 壽命，方便你進行死亡與書櫃傳承測試) --- */
    function lifeCycleTick() {
      if (isDead) return;
      plantLife -= 5;
      
      if (plantLife <= 0) {
        plantLife = 0;
        isDead = true;
        
        // 🕯️ 自動寫入書櫃回憶錄
        const memory = {
          gen: graveyard.length + 1,
          date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString(),
          result: currentStage === 4 ? "🌸 成功達成『完美開花』姿態" : `🌿 成長至第 ${currentStage} 階段`,
          text: "它在這張像素書桌上完成了使命，但這個溫馨的角落會永遠記住它。"
        };
        graveyard.push(memory);
        localStorage.setItem('pro_pixel_graveyard', JSON.stringify(graveyard));
        
        dialogueBox.innerHTML = "🕯️ 這株多肉安靜地迎來了生命的終點。它的一生已經被永久收錄進右側書櫃的日記本中了。";
      }
      renderUI();
    }

    /* --- 📚 書櫃互動邏輯 --- */
    bookcaseBtn.addEventListener('click', () => {
      historyList.innerHTML = "";
      if (graveyard.length === 0) {
        historyList.innerHTML = "<p style='color:#7a624e; text-align:center; font-weight:bold;'>[書櫃目前空無一物]<br>當有植物生命走到盡頭時，回憶日記會自動收藏在這裡。</p>";
      } else {
        [...graveyard].reverse().forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-card';
          div.innerHTML = `
            <p><b>📖【第 ${item.gen} 代 像素多肉】</b></p>
            <p>📅 時間軸: ${item.date}</p>
            <p>🌸 終極姿態: <span style="color:#b65353; font-weight:bold;">${item.result}</span></p>
            <p style="color:#7a624e; font-size:0.9rem; font-style: italic;">回憶錄筆記: "${item.text}"</p>
          `;
          historyList.appendChild(div);
        });
      }
      historyModal.classList.add('open');
    });

    closeModalBtn.addEventListener('click', () => {
      historyModal.classList.remove('open');
    });

    // 初始化世界
    renderUI();
    setInterval(lifeCycleTick, 20000); // 壽命流逝定時器
  </script>
</body>
</html>
