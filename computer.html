<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 暖心窗邊：多肉心靈避難所 📓</title>
  
  <style>
    /* ==========================================
       🎨 1. 全螢幕滿版與莫蘭迪溫暖色調優化
       ========================================== */
    * {
      box-sizing: border-box;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      /* 依照 image_d2b2d7.png 調製的高級米色系復古底色 */
      background-color: #f4eae1; 
      font-family: 'Courier New', 'Microsoft JhengHei', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 1s ease;
    }

    /* 🌙 深夜模式時的老爺外觀底色 */
    body.night-mode {
      background-color: #2b2621;
    }

    .game-screen {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 📦 完美還原手繪比例的空間容器 */
    .space-container {
      position: relative;
      width: 100%;
      max-width: 1024px;
      height: 100%;
      max-height: 576px;
      background-color: #ebdccb; /* 牆面暖色調 */
      border: 6px solid #5c4534;
      box-shadow: 0 30px 60px rgba(92, 69, 52, 0.25);
      overflow: hidden;
      transition: filter 1s ease;
    }

    /* ==========================================
       🧱 2. 完美還原你的手繪空間配置
       ========================================== */
    
    /* 📐 斜切中線：分出左牆與右牆 */
    .room-divider {
      position: absolute;
      top: 0; bottom: 0; left: 60%;
      width: 4px;
      background-color: #4a3629;
      z-index: 2;
    }

    /* 🪟 左側牆面：大窗戶與長條「黃色平台」 */
    .left-side {
      position: absolute;
      top: 0; left: 0; width: 60%; height: 100%;
      background-color: #f7ede2;
    }

    .window-frame {
      position: absolute;
      top: 10%; left: 10%; width: 80%; height: 50%;
      border: 5px solid #4a3629;
      background: linear-gradient(to bottom, #b3d1ff, #ffffff);
      overflow: hidden;
    }
    .stars {
      position: absolute; width: 100%; height: 100%;
      background-image: radial-gradient(circle, #fff 1.5px, transparent 1.5px);
      background-size: 40px 40px; opacity: 0; transition: opacity 1s;
    }

    /* 💛 你的靈魂手繪：黃色大平台 */
    .yellow-shelf {
      position: absolute;
      bottom: 22%; left: 8%; width: 84%; height: 14%;
      background-color: #f2b93b; /* 柔和、調色過的高級手繪感黃色 */
      border: 5px solid #4a3629;
      border-radius: 4px;
      box-shadow: 0 8px 0px rgba(74, 54, 41, 0.15);
    }

    /* 🌿 植物坐落處（精準站在黃色平台上） */
    .succulent-position {
      position: absolute;
      bottom: 30%; left: 42%;
      width: 105px; height: 105px;
      z-index: 10;
      display: flex; justify-content: center; align-items: flex-end;
    }
    .succulent-img {
      width: 100%; height: auto; cursor: pointer;
      filter: drop-shadow(0 6px 4px rgba(0,0,0,0.15));
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .succulent-img:active { transform: scale(1.2); }

    /* 🧱 右側牆面：Some裝飾與垂直「書櫃」 */
    .right-side {
      position: absolute;
      top: 0; right: 0; width: 40%; height: 100%;
      background-color: #ebdccb;
      padding: 30px;
      display: flex; flex-direction: column; align-items: center; justify-content: space-around;
    }

    /* 🖼️ 手繪中的：Some 裝飾 */
    .some-decor {
      border: 4px solid #4a3629;
      background: #ffffff;
      padding: 8px 20px;
      font-weight: bold;
      font-size: 0.9rem;
      color: #4a3629;
      box-shadow: 4px 4px 0px #4a3629;
      transform: rotate(-2deg);
    }

    /* 📚 手繪中的：直立式大書櫃 */
    .vertical-bookcase {
      width: 140px; height: 240px;
      background-color: #bc8a5f;
      border: 5px solid #4a3629;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: -6px 6px 0px rgba(74, 54, 41, 0.2);
      display: flex; flex-direction: column; justify-content: space-around; align-items: center;
      padding: 10px;
      transition: all 0.2s;
    }
    .vertical-bookcase:hover {
      transform: translate(2px, -2px);
      box-shadow: -8px 8px 0px rgba(74, 54, 41, 0.3);
      background-color: #af7d53;
    }
    .shelf-line { width: 100%; height: 4px; background: #4a3629; }
    .books { display: flex; gap: 4px; }
    .book { width: 14px; height: 35px; background: #cd6161; border: 2px solid #4a3629; }
    .book:nth-child(2) { background: #6197cd; height: 40px; transform: rotate(4deg); }

    /* ==========================================
       💡 3. 深夜小燈開關系統
       ========================================== */
    .room-light-switch {
      position: absolute;
      top: 25px; right: 25px;
      background: #fff8f0; border: 4px solid #4a3629;
      padding: 8px 16px; font-weight: bold; cursor: pointer;
      box-shadow: 4px 4px 0px #4a3629; z-index: 60;
    }
    .room-light-switch:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #4a3629; }

    /* 晚上開燈後的溫暖微光濾鏡 */
    .space-container.light-on::after {
      content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
      background: rgba(242, 185, 59, 0.12); /* 淡淡的暖黃光 */
      pointer-events: none; z-index: 40;
    }

    /* ==========================================
       💬 4. UI 介面層
       ========================================== */
    .hud-panel {
      position: absolute;
      top: 25px; left: 25px;
      background: #fff8f0; border: 4px solid #4a3629;
      padding: 10px 20px; font-weight: bold; font-size: 0.95rem;
      box-shadow: 5px 5px 0px #4a3629; z-index: 50;
    }

    .dialogue-box {
      position: absolute;
      bottom: 25px; left: 25px; right: 25px;
      background: #fff8f0; border: 4px solid #4a3629;
      padding: 18px; font-size: 1.05rem;
      box-shadow: 5px 5px 0px #4a3629; z-index: 50;
      min-height: 80px;
    }

    /* ==========================================
       📖 5. 歷史日記本彈窗
       ========================================== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(74, 56, 44, 0.6);
      display: flex; justify-content: center; align-items: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      z-index: 100;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: #fff8f0; border: 5px solid #4a3629;
      width: 90%; max-width: 450px; padding: 25px; text-align: center;
      box-shadow: 10px 10px 0px #4a3629;
    }
    .history-scroll {
      max-height: 240px; overflow-y: auto; margin: 15px 0;
      border-top: 2px dashed #4a3629; text-align: left;
    }
    .history-card { padding: 12px 0; border-bottom: 2px dashed #bc8a5f; }
    .close-btn { background: #4a3629; color: white; border: none; padding: 8px 24px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <button class="room-light-switch" id="light-btn">💡 開燈/關燈</button>

  <div class="game-screen">
    
    <div class="hud-panel" id="hud-text">
      ❤️ 多肉健康: 100% | 💖 親密度: 0/100 | 🌸 世代: 第 1 代
    </div>

    <div class="space-container" id="room-box">
      
      <div class="room-divider"></div>

      <div class="left-side">
        <div class="window-frame" id="window-sky">
          <div class="stars" id="sky-stars"></div>
        </div>
        
        <div class="yellow-shelf"></div>

        <div class="succulent-position">
          <img src="https://i.imgur.com/83pZpGZ.png" class="succulent-img" id="succulent-img" alt="溫潤色調像素多肉">
        </div>
      </div>

      <div class="right-side">
        <div class="some-decor">🖼️ Some 裝飾</div>

        <div class="vertical-bookcase" id="bookcase-btn" title="打開過往的多肉回憶錄">
          <div class="books">
            <div class="book"></div>
            <div class="book"></div>
          </div>
          <div class="shelf-line"></div>
          <span style="font-size: 0.8rem; font-weight: bold; color: #fff;">植物回憶錄</span>
          <div class="shelf-line"></div>
        </div>
      </div>

    </div>

    <div class="dialogue-box" id="dialogue-box">
      「歡迎來到你的專屬小空間。點擊窗台上的多肉來照顧它，或是靜靜地聽它說說話吧。」
    </div>

  </div>

  <div class="modal-overlay" id="history-modal">
    <div class="modal-box">
      <h3 style="margin-top: 0; color: #4a382c;">📖 珍藏的回憶錄</h3>
      <div class="history-scroll" id="history-list"></div>
      <button class="close-btn" id="close-modal-btn">闔上日記</button>
    </div>
  </div>

  <script>
    const bodyNode = document.body;
    const roomBox = document.getElementById('room-box');
    const windowSky = document.getElementById('window-sky');
    const skyStars = document.getElementById('sky-stars');
    const succulentImg = document.getElementById('succulent-img');
    const hudText = document.getElementById('hud-text');
    const dialogueBox = document.getElementById('dialogue-box');
    const lightBtn = document.getElementById('light-btn');
    
    const historyModal = document.getElementById('history-modal');
    const bookcaseBtn = document.getElementById('bookcase-btn');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const historyList = document.getElementById('history-list');

    // 遊戲數據
    let plantLife = 100;
    let lovePoints = 0;
    let currentStage = 1;
    let isDead = false;
    let isLightOn = true; // 預設電燈是亮著的

    // 讀取歷史
    let graveyard = JSON.parse(localStorage.getItem('soup_graveyard')) || [];

    // 🎯 精心挑選符合 image_d2b2d7 的粉嫩暖色調像素多肉生長鏈
    const toneAdjustedAssets = {
      1: "https://i.imgur.com/83pZpGZ.png", // 階段 1：精緻暖色系小多肉
      2: "https://i.imgur.com/uR1GAsg.png", // 階段 2：粉綠漸層飽滿姿態
      3: "https://i.imgur.com/tYtS97O.png", // 階段 3：群生粉嫩粉紫多肉
      4: "https://i.imgur.com/n1hXp5r.png", // 階段 4：頂端綻放精美暖橘色小花
      dead: "https://i.imgur.com/8O8338W.png" // ☠️ 留下的一顆充滿希望的溫暖種子
    };

    // 📜 整合自你提供的網頁！精選 8 則極具厚度與能量的職場/生活心靈雞湯語錄
    const chickenSoups = [
      "「無論多麼沉重的負擔，只要分成一小段一小段，任何人都可以撐到無影無蹤。」✨",
      "「不要因為走得太遠，而忘記了當初為什麼出發。每一步，都是為了變成更好的自己。」💪",
      "「生命有它自己的節奏，就像多肉一樣，慢慢長大、慢慢開花，不必對自己拔苗助長。」🌿",
      "「深夜的黑暗只是為了襯托星光。允許自己今天不完美，睡一覺，明天又是全新的一天。」🌙",
      "「每個人都在自己的時區裡前進，你沒有落後，你只是在等待屬於你的盛開季節。」🌸",
      "「把期望降低，把依賴變少，你會發現生活正在悄悄變得越來越好。」❤️",
      "「溫柔地對待世界之前，請記得先學會無條件地、溫柔地抱抱疲憊的自己。」🧸",
      "「只要你還願意努力，最壞的結果，也不過是大器晚成。」🌟"
    ];

    /* --- ☀️ 晝夜與電燈連動系統 --- */
    function checkTimeAndEnvironment() {
      const hour = new Date().getHours();
      const isNight = (hour >= 19 || hour < 6);

      if (isNight) {
        bodyNode.classList.add('night-mode');
        windowSky.style.background = "linear-gradient(to bottom, #151a21, #2a3442)";
        skyStars.style.opacity = "0.85";
        
        if (!isLightOn) {
          roomBox.style.filter = "brightness(0.4) contrast(1.1)"; // 沒開燈時，房間會變暗
        } else {
          roomBox.style.filter = "brightness(0.95)"; // 開燈時，維持溫馨微光
        }
      } else {
        // 白天
        bodyNode.classList.remove('night-mode');
        windowSky.style.background = "linear-gradient(to bottom, #b3d1ff, #ffffff)";
        skyStars.style.opacity = "0";
        roomBox.style.filter = "none";
      }
      renderUI();
    }

    // 玩家手動開關燈開關
    lightBtn.addEventListener('click', () => {
      isLightOn = !isLightOn;
      if (isLightOn) {
        roomBox.classList.add('light-on');
      } else {
        roomBox.classList.remove('light-on');
      }
      checkTimeAndEnvironment();
    });

    function renderUI() {
      if (isDead) {
        hudText.innerHTML = `🕯️ 狀態: 生命已化作故事 | ⏳ 世代: 第 ${graveyard.length + 1} 代`;
        succulentImg.src = toneAdjustedAssets.dead;
        return;
      }
      hudText.innerHTML = `❤️ 多肉健康: ${plantLife}% | 💖 親密度: ${lovePoints}/100 | 🌲 階段: ${currentStage}/4`;
      succulentImg.src = toneAdjustedAssets[currentStage];
    }

    /* --- 🌿 24小時無間斷多肉全天候互動 --- */
    succulentImg.addEventListener('click', () => {
      if (isDead) {
        dialogueBox.innerHTML = "「盆栽裡留下一顆微小的像素種子。點擊右邊牆上的直立書櫃，翻閱它曾留下的美好回憶吧。」";
        return;
      }

      const hour = new Date().getHours();
      
      // 🌙 深夜點擊多肉：觸發心靈雞湯樹洞模式！
      if (hour >= 19 || hour < 6) {
        lovePoints = Math.min(lovePoints + 5, 100); // 晚上互動增加微量親密度
        const randomQuote = chickenSoups[Math.floor(Math.random() * chickenSoups.length)];
        dialogueBox.innerHTML = `<b>多肉似乎聽懂了你的心聲，輕輕搖曳著葉片遞給你一句話：</b><br><span style='color:#a36c3c;'>${randomQuote}</span>`;
      } 
      // ☀️ 白天點擊多肉：正常培育增長
      else {
        lovePoints += 25;
        dialogueBox.innerHTML = "「你幫多肉挪到了陽光最充足的角度，並滴入幾滴輕柔的泉水。它看起來很開心！」";
      }

      // 晉級與進化
      if (lovePoints >= 100) {
        lovePoints = 0;
        plantLife = Math.min(plantLife + 35, 100);
        dialogueBox.innerHTML = "✨ <b>【大成長！】</b> 你的悉心陪伴讓多肉產生了驚人的蛻變，生命力大幅提升！";
        if (currentStage < 4) currentStage++;
      }
      renderUI();
    });

    /* --- 生命自然消耗定時器 (每 20 秒扣 5% 壽命，供測試用) --- */
    function lifeDrain() {
      if (isDead) return;
      plantLife -= 5;
      
      if (plantLife <= 0) {
        plantLife = 0;
        isDead = true;
        
        // 自動寫入回憶錄
        const memory = {
          gen: graveyard.length + 1,
          date: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString(),
          result: currentStage === 4 ? "🌸 完美達成開花期" : `🌿 生長至第 ${currentStage} 階段`,
          text: "不論時間如何流逝，這個黃色窗台會永遠記得你曾對它的溫柔。"
        };
        graveyard.push(memory);
        localStorage.setItem('soup_graveyard', JSON.stringify(graveyard));
        dialogueBox.innerHTML = "🕯️ 這株多肉安靜地結束了它的生命旅程。它的故事已經化作一本泛黃的日記，永久收藏在右側的書櫃上了。";
      }
      renderUI();
    }

    /* --- 📚 書櫃歷史日記互動 --- */
    bookcaseBtn.addEventListener('click', () => {
      historyList.innerHTML = "";
      if (graveyard.length === 0) {
        historyList.innerHTML = "<p style='color:#7a624e; text-align:center; font-weight:bold; padding-top:20px;'>[書櫃目前空無一物]<br>當有植物生命走到盡頭時，它的靈魂日記會自動保存在這裏。</p>";
      } else {
        [...graveyard].reverse().forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-card';
          div.innerHTML = `
            <p><b>📜【第 ${item.gen} 代 多肉故事】</b></p>
            <p>📅 畢業時間: ${item.date}</p>
            <p>🌸 終極型態: <span style="color:#bc8a5f; font-weight:bold;">${item.result}</span></p>
            <p style="color:#7a624e; font-size:0.9rem; font-style: italic;">"${item.text}"</p>
          `;
          historyList.appendChild(div);
        });
      }
      historyModal.classList.add('open');
    });

    closeModalBtn.addEventListener('click', () => { historyModal.classList.remove('open'); });

    // 初始化啟動
    roomBox.classList.add('light-on');
    checkTimeAndEnvironment();
    setInterval(checkTimeAndEnvironment, 30000); // 每 30 秒確認一次時間天色
    setInterval(lifeDrain, 20000); // 啟動生命流逝
  </script>
</body>
</html>
