<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Garden - Focus Hub</title>
    <style>
        :root {
            --bg-base: #14171c;
            --bg-gradient: linear-gradient(135deg, #1e222b 0%, #14171c 100%);
            --bg-card: rgba(40, 44, 55, 0.6);
            --bg-inner: rgba(26, 29, 36, 0.8);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-botanical: #66c18c;
            --accent-bloom: #f28b82;
            --border-glow: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

        .nav-bar { display: flex; gap: 15px; margin-bottom: 30px; width: 100%; max-width: 1100px; }
        .nav-btn { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border-glow); padding: 12px 24px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; backdrop-filter: var(--glass-blur); }
        .nav-btn:hover { background: rgba(102, 193, 140, 0.1); color: var(--text-main); }
        .nav-btn.active { background: var(--accent-botanical); color: #fff; border-color: var(--accent-botanical); box-shadow: 0 4px 15px rgba(102, 193, 140, 0.3); }

        .view-content { width: 100%; max-width: 1100px; display: none; animation: fadeIn 0.4s ease; }
        .view-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 圖鑑網格 */
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .plant-card { background: var(--bg-card); border-radius: 20px; padding: 25px 20px; border: 1px solid var(--border-glow); text-align: center; cursor: pointer; transition: all 0.3s ease; backdrop-filter: var(--glass-blur); position: relative; overflow: hidden; }
        .plant-card:hover { transform: translateY(-5px); border-color: var(--accent-botanical); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        /* 狀態標籤 */
        .stage-badge { position: absolute; top: 12px; left: 12px; font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 600; z-index: 10; }
        .stage-seed { background: rgba(255,255,255,0.1); color: var(--text-muted); }
        .stage-grow { background: rgba(102, 193, 140, 0.2); color: var(--accent-botanical); }
        .stage-bloom { background: rgba(242, 139, 130, 0.2); color: var(--accent-bloom); }

        /* 🔥 全新防碎邊、防對位歪掉的遮罩裁切樣式 🔥 */
        .pixel-sprite { 
            width: 80px; 
            height: 80px; 
            margin: 25px auto 15px; 
            display: block; 
            position: relative;
            overflow: hidden; /* 隱藏框框外的其他植物 */
        }
        .pixel-sprite img {
            position: absolute;
            width: 300%;  /* 3欄 = 300% 寬 */
            height: 1000%; /* 10列 = 1000% 高 */
            /* 用精確的 100% 乘以變數，完美消滅浮點數捨入誤差 */
            left: calc(var(--col) * -100%);
            top: calc(var(--row) * -100%);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            pointer-events: none;
        }

        .progress-bar-bg { background: rgba(0,0,0,0.3); width: 100%; height: 8px; border-radius: 4px; margin-top: 15px; overflow: hidden; }
        .progress-bar-fill { background: var(--accent-botanical); height: 100%; width: 0%; transition: width 0.5s ease; }

        /* 專注艙排版 */
        .focus-split { display: grid; grid-template-columns: 4fr 6fr; gap: 30px; }
        @media (max-width: 900px) { .focus-split { grid-template-columns: 1fr; } }
        .panel { background: var(--bg-card); border-radius: 24px; padding: 40px; border: 1px solid var(--border-glow); backdrop-filter: var(--glass-blur); }
        
        .timer-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
        .timer-big { font-size: 85px; font-weight: 200; font-family: 'Courier New', monospace; color: var(--text-main); margin: 25px 0; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .btn-action { background: var(--accent-botanical); color: #fff; border: none; padding: 16px 50px; font-size: 18px; font-weight: 700; border-radius: 40px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(102, 193, 140, 0.3); }
        .btn-action:hover { transform: scale(1.05); }
        .btn-action.running { background: #e07a5f; box-shadow: 0 4px 15px rgba(224, 122, 95, 0.3); }

        /* 百科面板 */
        .ep-header { display: flex; gap: 20px; border-bottom: 1px solid var(--border-glow); padding-bottom: 25px; margin-bottom: 25px; align-items: center; }
        
        .ep-photo-box { width: 100px; height: 100px; border-radius: 16px; overflow: hidden; border: 2px solid var(--border-glow); background: var(--bg-inner); display: flex; align-items: center; justify-content: center; }
        .ep-real-photo { width: 100%; height: 100%; object-fit: cover; }
        .photo-locked { color: var(--text-muted); font-size: 24px; }
        
        .ep-title-area { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .ep-name { font-size: 32px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .ep-sci { font-size: 15px; color: var(--text-muted); font-style: italic; }
        
        .ep-section { margin-bottom: 24px; }
        .ep-section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .ep-block-box { background: var(--bg-inner); padding: 20px; border-radius: 16px; font-size: 15px; line-height: 1.7; border: 1px solid rgba(255,255,255,0.03); }
        
        .attribute-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .attr-item span { color: var(--text-muted); font-size: 12px; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .attr-item strong { font-size: 16px; color: var(--text-main); }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="nav-btn active" id="navToCatalog">📖 溫室圖鑑</button>
        <button class="nav-btn" id="navToFocus">⏱️ 專注培育艙</button>
    </div>

    <div class="view-content active" id="viewCatalog">
        <div class="catalog-grid" id="catalogGrid"></div>
    </div>

    <div class="view-content" id="viewFocus">
        <div class="focus-split" id="focusSplitWrapper">
            <div class="panel timer-panel">
                <div id="focusStageBadge" class="stage-badge" style="position: relative; margin-bottom: 20px; left: 0; top: 0;">幼苗期</div>
                
                <div id="activePlantSprite" class="pixel-sprite" style="width: 140px; height: 140px; margin: 0;">
                    <img src="plantsss.png" alt="多肉植物">
                </div>
                
                <div class="timer-big" id="timeDisplay">25:00</div>
                <div id="focusTargetLabel" style="font-size:14px; color:var(--text-muted); margin-bottom: 25px;">目標：? 次</div>
                <button class="btn-action" id="timerActionBtn">開始培育</button>
            </div>

            <div class="panel">
                <div class="ep-header">
                    <div class="ep-photo-box" id="epPhotoContainer"></div>
                    <div class="ep-title-area">
                        <div class="ep-name" id="epName">-</div>
                        <div class="ep-sci" id="epSci">-</div>
                    </div>
                </div>

                <div class="ep-section">
                    <div class="ep-section-title">🪴 培育資訊</div>
                    <div class="ep-block-box attribute-grid">
                        <div class="attr-item"><span>原產地</span><strong id="epOrigin">-</strong></div>
                        <div class="attr-item"><span>實際成株所需</span><strong id="epGrowthTime">-</strong></div>
                        <div class="attr-item" style="grid-column: span 2;"><span>累積專注時數</span><strong id="epStatCount">0 次</strong></div>
                    </div>
                </div>

                <div class="ep-section">
                    <div class="ep-section-title">📖 專屬小百科</div>
                    <div class="ep-block-box" id="epTrivia" style="color: var(--text-main); line-height: 1.8;">
                        鎖定中，完成目標後解鎖完整知識與相片。
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div style="width:100%; max-width:1100px; margin-top:30px; text-align:right;">
        <button id="quickCheatBtn" style="background:transparent; color:var(--text-muted); border:1px solid var(--border-glow); padding: 5px 10px; border-radius: 5px; cursor:pointer;">⚡ 測試：+1 次專注</button>
        <button id="clearDataBtn" style="background:transparent; color:var(--accent-bloom); border:1px solid var(--border-glow); padding: 5px 10px; border-radius: 5px; cursor:pointer; margin-left:10px;">🗑️ 重置存檔</button>
    </div>

    <script>
        // 🌿 精緻多肉植物資料庫與「細膩、有趣」的專屬冷知識
        const plantDatabase = [
            { id: 0, row: 0, name: "乙女心", sci: "Sedum pachyphyllum", origin: "墨西哥", growthTime: "約 1~2 年", target: 3, trivia: "🍬 <strong>果凍腮紅的祕密：</strong>乙女心像手指一樣肥厚的葉片，在秋冬遇到「大溫差」和充足日照時，尖端會染上像塗了腮紅般的果凍紅！這其實是它為了在高山乾旱地區保護自身、貯存水分而演化出的美麗姿態。", photo: "plant_1.jpg" },
            { id: 1, row: 1, name: "虹之玉", sci: "Sedum rubrotinctum", origin: "墨西哥", growthTime: "約 1 年", target: 5, trivia: "🫘 <strong>伸縮自如的「植物界糖果」：</strong>因酷似亮晶晶的果凍豆（Jelly Beans）而得名。為了減少表面積、防止體內的水分蒸發，它把葉子縮成了圓滾滾的形狀。在陽光與低溫的魔法下，整株會退去綠色，轉化成令人垂涎的紅寶石色！", photo: "plant_2.jpg" },
            { id: 2, row: 2, name: "姬秋麗", sci: "Graptopetalum mendozae", origin: "墨西哥", growthTime: "約 1 年", target: 7, trivia: "🍂 <strong>落葉歸根的超強繁殖力：</strong>姬秋麗是名副其實的「生育大師」。哪怕只是不小心碰落的一片小葉子，只要掉在土壤上（葉孵），它就能頑強地自己發根、萌芽，長成一株全新、帶有淡粉橘色光澤的完美多肉植物。", photo: "plant_3.jpg" },
            { id: 3, row: 3, name: "桃之卵", sci: "Graptopetalum amethystinum", origin: "墨西哥", growthTime: "約 2~3 年", target: 10, trivia: "🧴 <strong>自備高級防曬霜：</strong>桃之卵擁有像粉紅鳥蛋般夢幻的圓潤葉片。仔細觀察，它表面覆蓋著一層厚厚的「白粉」（角質蠟粉）。這層粉不是灰塵，而是它對抗荒漠強烈紫外線的「天然防曬霜」，洗掉就不會再長回來囉！", photo: "plant_4.jpg" },
            { id: 4, row: 4, name: "熊童子", sci: "Cotyledon tomentosa", origin: "南非", growthTime: "約 2~3 年", target: 12, trivia: "🐾 <strong>毛茸茸小爪子的智慧：</strong>熊童子最著名的就是那像絨毛娃娃般的「小熊掌」。這些細密的絨毛能形成微小的空氣靜止層，幫助鎖住空氣濕度，並抵禦非洲乾燥的強風。陽光曬得越好，爪子的「紅指甲」就越明顯！", photo: "plant_5.jpg" },
            { id: 5, row: 5, name: "月美人", sci: "Pachyphytum bracteosum", origin: "墨西哥中部", growthTime: "約 2~3 年", target: 15, trivia: "🌕 <strong>月光下的鵝卵石：</strong>葉片圓潤飽滿如卵，覆蓋著濃厚白霜。這種扁平鵝卵石般的形狀有利於在自然環境中「偏轉陽光」，保持內部溫度的清涼。", photo: "plant_6.jpg" },
            { id: 6, row: 6, name: "七福神", sci: "Echeveria secunda var. glauca", origin: "墨西哥", growthTime: "約 1~2 年", target: 18, trivia: "🌀 <strong>大自然完美的數學幾何：</strong>七福神的葉片呈現標準的完美蓮座狀。這並非隨機生長，而是精準符合數學上的「斐波那契螺旋（黃金比例）」，這種排列能確保「每一片葉子」都能曬到最大面積的陽光，互不遮擋！", photo: "plant_7.jpg" },
            { id: 7, row: 7, name: "立方霜", sci: "Graptoveria 'Cubic Frost'", origin: "園藝交種", growthTime: "約 1~2 年", target: 20, trivia: "📐 <strong>反常規的摺紙葉片：</strong>立方霜顛覆了人們對多肉植物的印象，它的葉子是向外反捲、折疊成方形或心形的。這種獨特的管狀幾何結構，能大幅增加表面積，讓厚粉更容易附著，提供360度無視死角的耐曬保護力。", photo: "plant_8.jpg" },
            { id: 8, row: 8, name: "千兔耳", sci: "Kalanchoe millotii", origin: "馬達加斯加", growthTime: "約 2~3 年", target: 25, trivia: "🐇 <strong>摸不透的鋸齒兔耳：</strong>它擁有像毛呢布料質感的毛茸茸葉片，邊緣帶著俏皮的微鋸齒。比起其他嬌氣的多肉，千兔耳非常耐熱耐旱，甚至能直接在葉片邊緣「直接長出」小北鼻苗，繁殖方式就像魔法一樣奇特！", photo: "plant_9.jpg" },
            { id: 9, row: 9, name: "白烏帽子", sci: "Opuntia microdasys var. albispina", origin: "墨西哥", growthTime: "約 3~5 年", target: 30, trivia: "⚠️ <strong>可愛兔耳的「溫柔陷阱」：</strong>俗稱米老鼠仙人掌。它身上那些一點一點、看起來像棉花球的白色毛束並不是軟毛，而是成千上萬根比頭髮還細、帶倒鉤的「微型刺毛（Glochids）」。一旦風吹或用手碰，就會輕易脫落並黏附在皮膚上引起刺癢，屬於「只能遠觀」的帶刺可愛派！", photo: "plant_10.jpg" }
        ];

        let playerProgress;
        try {
            const rawData = localStorage.getItem('pixel_garden_v6');
            playerProgress = rawData ? JSON.parse(rawData) : null;
            if (!playerProgress || typeof playerProgress.currentActiveId !== 'number' || !playerProgress.counts) {
                throw new Error("Data corrupted");
            }
        } catch (e) {
            playerProgress = { currentActiveId: 0, counts: {} };
        }

        let timeLeft = 1500;
        let timerId = null;
        let isTimerRunning = false;

        function getPlantStageInfo(count, target) {
            if (count === 0) return { name: "幼苗期", class: "stage-seed", col: 0 };
            if (count >= target) return { name: "開花/成株期", class: "stage-bloom", col: 2 };
            return { name: "生長期", class: "stage-grow", col: 1 };
        }

        function renderCatalog() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';

            plantDatabase.forEach(plant => {
                const count = playerProgress.counts[plant.id] || 0;
                const percent = Math.min((count / plant.target) * 100, 100);
                const stage = getPlantStageInfo(count, plant.target);
                
                const card = document.createElement('div');
                card.className = `plant-card`;
                card.innerHTML = `
                    <div style="font-size:11px; color:var(--text-muted);">目標: ${plant.target} 次</div>
                    
                    <div class="pixel-sprite" style="--row: ${plant.row}; --col: ${stage.col};">
                        <img src="plantsss.png" alt="${plant.name}">
                    </div>
                    
                    <h4 style="font-size:16px; font-weight:600; margin-bottom:2px;">${plant.name}</h4>
                    <div style="font-size:12px; color:var(--text-muted);">${plant.id === playerProgress.currentActiveId ? '🟢 當前培育' : '&nbsp;'}</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${percent}%"></div></div>
                    <div style="font-size:11px; text-align:right; margin-top:4px; color:var(--text-muted);">${count}/${plant.target}</div>
                `;

                card.onclick = () => {
                    playerProgress.currentActiveId = plant.id;
                    saveData();
                    switchView('focus');
                    loadActivePlantDetails();
                    renderCatalog(); 
                };
                grid.appendChild(card);
            });
        }

        function loadActivePlantDetails() {
            const plant = plantDatabase[playerProgress.currentActiveId];
            if (!plant) return; 
            const count = playerProgress.counts[plant.id] || 0;
            const stage = getPlantStageInfo(count, plant.target);
            const isUnlocked = count >= plant.target;

            document.getElementById('focusTargetLabel').textContent = `目標解鎖：${plant.target} 次`;
            const badge = document.getElementById('focusStageBadge');
            badge.className = `stage-badge ${stage.class}`;
            badge.textContent = stage.name;
            
            const activeSprite = document.getElementById('activePlantSprite');
            activeSprite.style.setProperty('--row', plant.row);
            activeSprite.style.setProperty('--col', stage.col);

            document.getElementById('epName').textContent = plant.name;
            document.getElementById('epSci').textContent = plant.sci;
            document.getElementById('epOrigin').textContent = plant.origin;
            document.getElementById('epGrowthTime').textContent = plant.growthTime;
            document.getElementById('epStatCount').textContent = `${count} 次`;
            
            const photoContainer = document.getElementById('epPhotoContainer');
            const triviaContainer = document.getElementById('epTrivia');
            
            if (isUnlocked) {
                photoContainer.innerHTML = `<img src="${plant.photo}" class="ep-real-photo" alt="真實相片">`;
                triviaContainer.style.color = "var(--text-main)";
                triviaContainer.style.background = "rgba(102, 193, 140, 0.1)"; 
                triviaContainer.style.borderColor = "rgba(102, 193, 140, 0.3)";
                triviaContainer.innerHTML = plant.trivia;
            } else {
                photoContainer.innerHTML = `<div class="photo-locked">🔒</div>`;
                triviaContainer.style.color = "var(--text-muted)";
                triviaContainer.style.background = "var(--bg-inner)";
                triviaContainer.style.borderColor = "rgba(255,255,255,0.03)";
                triviaContainer.innerHTML = `🔒 <strong>尚未解鎖</strong><br><br>這株多肉植物似乎藏著有趣的秘密... 完成 ${plant.target} 次專注培育後，即可解鎖它的專屬圖鑑知識與真實相片。`;
            }
        }

        function updateTimerDisplay() {
            let m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            let s = String(timeLeft % 60).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${m}:${s}`;
        }

        function executeSessionIncrement() {
            const activeId = playerProgress.currentActiveId;
            playerProgress.counts[activeId] = (playerProgress.counts[activeId] || 0) + 1;
            saveData();
            loadActivePlantDetails();
            renderCatalog();
        }

        document.getElementById('timerActionBtn').onclick = () => {
            const btn = document.getElementById('timerActionBtn');
            if (isTimerRunning) {
                clearInterval(timerId);
                isTimerRunning = false;
                btn.textContent = "繼續培育";
                btn.classList.remove('running');
            } else {
                isTimerRunning = true;
                btn.textContent = "暫停專注";
                btn.classList.add('running');
                
                const plant = plantDatabase[playerProgress.currentActiveId];
                if((playerProgress.counts[plant.id] || 0) === 0) {
                    const activeSprite = document.getElementById('activePlantSprite');
                    activeSprite.style.setProperty('--col', 1); 
                    document.getElementById('focusStageBadge').textContent = "生長中...";
                    document.getElementById('focusStageBadge').className = "stage-badge stage-grow";
                }

                timerId = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        isTimerRunning = false;
                        btn.textContent = "開始培育";
                        btn.classList.remove('running');
                        timeLeft = 1500;
                        executeSessionIncrement();
                        updateTimerDisplay();
                        alert("🎉 專注完成！植物獲得了成長！");
                    }
                }, 1000);
            }
        };

        function switchView(viewName) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (viewName === 'catalog') {
                document.getElementById('viewCatalog').classList.add('active');
                document.getElementById('navToCatalog').classList.add('active');
            } else {
                document.getElementById('viewFocus').classList.add('active');
                document.getElementById('navToFocus').classList.add('active');
            }
        }

        document.getElementById('navToCatalog').onclick = () => switchView('catalog');
        document.getElementById('navToFocus').onclick = () => switchView('focus');
        document.getElementById('quickCheatBtn').onclick = executeSessionIncrement;
        document.getElementById('clearDataBtn').onclick = () => {
            if(confirm("確定要清除所有進度嗎？")) { localStorage.removeItem('pixel_garden_v6'); location.reload(); }
        };

        function saveData() { localStorage.setItem('pixel_garden_v6', JSON.stringify(playerProgress)); }

        renderCatalog();
        loadActivePlantDetails();
