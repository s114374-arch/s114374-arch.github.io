<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloomodoro</title>
  
  <style>
    /* ==========================================
       🎨 1. 視覺樣式表 (CSS)
       ========================================== */
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #f1f8fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .game-container {
      width: 90%; max-width: 960px;
      display: flex; gap: 20px; flex-wrap: wrap;
    }

    /* 通用卡片樣式 */
    .card {
      background: #fff; border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      padding: 20px;
    }

    /* 🧱 左側：遊戲主畫面與番茄鐘面板 */
    .pomo-column { flex: 2; display: flex; flex-direction: column; gap: 20px; }
    
    .room-stage {
      height: 300px;
      background-color: #fff;
      display: grid; grid-template-columns: repeat(3, 1fr); align-items: end; justify-items: center;
      border: 4px solid #fff; border-radius: 12px;
    }

    .pot-slot { position: relative; width: 100%; text-align: center; }
    .slot-label { font-size: 11px; color: #999; margin-bottom: 5px; }
    .plant-emoji { font-size: 80px; }

    /* 植物成長動畫效果 */
    .grow-animation {
      animation: growBoost 1s ease;
    }
    @keyframes growBoost {
      0% { transform: scale(1); }
      50% { transform: scale(1.4) translateY(-10px); }
      100% { transform: scale(1); }
    }

    .control-panel { display: flex; flex-direction: column; align-items: center; text-align: center; }
    #timer { font-size: 48px; font-weight: bold; color: #cd6161; margin: 10px 0; }

    .ctrl-btns { display: flex; gap: 10px; }
    .btn {
      padding: 10px 20px; font-size: 14px; font-weight: bold;
      background: #f2b93b; color: #fff; border: none; border-radius: 6px; cursor: pointer;
    }
    .btn.stop { background: #cd6161; }

    /* 📊 統計資訊 */
    .stats-info {
      display: flex; justify-content: space-around;
      font-size: 14px; font-weight: bold; color: #5c4a3b;
    }

    /* 📖 右側：Bloomopedia 百科全書 */
    .wiki-column { flex: 1.5; min-width: 320px; }
    
    .wiki-header {
      margin-top: 0; color: #5c4a3b; border-bottom: 2px solid #5c4a3b; padding-bottom: 5px;
    }

    .wiki-content {
      max-height: 520px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 15px;
    }

    .plant-entry {
      border: 2px solid #e0e0e0; border-radius: 8px; padding: 15px;
    }

    /* 鎖定狀態 */
    .locked-entry {
      opacity: 0.4; filter: grayscale(100%);
    }

    .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
    .plant-name-block { display: flex; flex-direction: column; }
    .p-name { font-weight: bold; font-size: 16px; color: #3a5fcd; }
    .p-sci { font-size: 12px; color: #7f8c8d; font-style: italic; }
    .p-badge { font-size: 12px; color: #cd6161; }

    /* 區塊樣式 */
    .entry-block { margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
    .block-title { font-weight: bold; font-size: 13px; color: #5c4a3b; margin-bottom: 4px; }
    .block-info { font-size: 13px; color: #5c4a3b; line-height: 1.4; }

    /* 真實照片預留區 */
    .real-photo-slot {
      width: 100%; height: 100px;
      background: #eee3d5; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #999; font-size: 12px;
    }

  </style>
</head>
<body>

  <div class="game-container">
    
    <!-- 左側面板 -->
    <div class="pomo-column">
      
      <!-- 遊戲舞台區 -->
      <div class="card room-stage">
        <div class="pot-slot">
          <div class="slot-label">[陪伴植物A]</div>
          <div>🌿</div>
        </div>
        <div class="pot-slot">
          <div class="slot-label">[培育中]</div>
          <div id="plantEmoji" class="plant-emoji">🌰</div>
        </div>
        <div class="pot-slot">
          <div class="slot-label">[陪伴植物B]</div>
          <div>🌸</div>
        </div>
      </div>

      <!-- 控制區 -->
      <div class="card control-panel">
        <h1>🌱 Bloomodoro</h1>
        <div id="timer">25:00</div>
        <div class="ctrl-btns">
          <button class="btn" id="start-btn">開始專注</button>
          <button class="btn stop" id="reset-btn">重設</button>
          <button class="btn" id="cheat-btn" style="background:#ddd; color:#333;">[測試快進]</button>
        </div>
      </div>

      <!-- 統計區 -->
      <div class="card stats-info">
        <div>總番茄鐘：<span id="focus-count">0</span></div>
        <div>完成植物數：<span id="completed-plants">0</span></div>
      </div>
    </div>

    <!-- 右側面板：Bloomopedia 百科全書 -->
    <div class="card wiki-column">
      <h3 class="wiki-header">📖 Bloomopedia</h3>
      
      <div class="wiki-content" id="wiki-content">
        <!-- 植物百科插槽 -->
      </div>
    </div>

  </div>

  <!-- ==========================================
       🧠 核心控制邏輯 (JavaScript)
       ========================================== */ -->
  <script>
    // 通用 DOM 元件
    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const cheatBtn = document.getElementById('cheat-btn');
    const plantImg = document.getElementById('plantEmoji');
    const focusCountDisplay = document.getElementById('focus-count');
    const completedPlantsDisplay = document.getElementById('completed-plants');
    const wikiContent = document.getElementById('wiki-content');

    // 遊戲核心數據，從 LocalStorage 載入
    let totalFocusSessions = parseInt(localStorage.getItem('bloomodoro_focus_sessions')) || 0;
    focusCountDisplay.innerText = totalFocusSessions;

    // 番茄鐘變數
    let timerId = null;
    let isCounting = false;
    let secondsLeft = 1500; // 預設 25 分鐘

    // 植物百科知識庫數據
    const plantKnowledgeBase = [
      {
        id: "Wiki-BearPaws",
        name: "熊童子",
        sciName: "Cotyledon tomentosa",
        family: "景天科",
        origin: "南非",
        unlockCount: 1, // 需要幾株植物成熟解鎖此百科
        growthSpeed: "★★★☆☆",
        droughtToler: "★★★★★",
        difficulty: "★☆☆☆☆",
        bloomRate: "★★☆☆☆",
        trivia: [
          "熊童子的葉尖有紅色鋸齒。",
          "看起來像熊掌。",
          "因此得名熊童子。"
        ]
      }
    ];

    // 更新介面狀態
    function updateUI() {
      focusCountDisplay.innerText = totalFocusSessions;
      completedPlantsDisplay.innerText = totalFocusSessions; // 簡化遊戲：完成幾次專注就解鎖幾次
      
      // 植物視覺更新（種子、萌芽、成長、含苞、盛開）
      let stage = totalFocusSessions % 5;
      const localAssets = ['🌰', '🌱', '🌿', '🌸', '🌺'];
      plantImg.innerText = localAssets[stage];
      plantImg.classList.remove('grow-animation'); // 移除舊動畫

      // 更新百科全書解鎖狀態
      renderEncyclopedia();
    }

    // 渲染百科全書內容
    function renderEncyclopedia() {
      wikiContent.innerHTML = ''; // 清空內容

      plantKnowledgeBase.forEach(plant => {
        // 檢查解鎖狀態
        const isLocked = totalFocusSessions < plant.unlockCount;
        
        const entryDiv = document.createElement('div');
        entryDiv.className = `plant-entry ${isLocked ? 'locked-entry' : ''}`;
        
        // ① 基本資料與解鎖條件
        const lockBadgeText = isLocked ? `[待解鎖：成熟 ${plant.unlockCount} 次]` : '[已解鎖]';
        
        const triviaContent = isLocked 
          ? '完成番茄鐘自動解鎖詳細資訊...' 
          : plant.trivia.map(point => `- ${point}`).join('<br>');
        
        const生長速度Content = isLocked ? '?' : plant.growthSpeed;
        const耐旱程度Content = isLocked ? '?' : plant.droughtToler;
        const照顧難度Content = isLocked ? '?' : plant.difficulty;
        const開花機率Content = isLocked ? '?' : plant.bloomRate;

        // 百科內容 HTML 結構
        entryDiv.innerHTML = `
          <div class="entry-header">
            <div class="plant-name-block">
              <span class="p-name">${plant.name}</span>
              <span class="p-sci">${plant.sciName}</span>
            </div>
            <div class="p-badge">${lockBadgeText}</div>
          </div>
          
          <div class="entry-block">
            <div class="block-title">① 基本資料</div>
            <div class="block-info">
              科屬：${plant.family}<br>
              原產地：${plant.origin}
            </div>
          </div>
          
          <div class="entry-block">
            <div class="block-title">② 生長資訊</div>
            <div class="block-info">
              生長速度：${生長速度Content}<br>
              耐旱程度：${耐旱程度Content}<br>
              照顧難度：${照顧難度Content}<br>
              開花機率：${開花機率Content}
            </div>
          </div>
          
          <div class="entry-block">
            <div class="block-title">③ 小知識</div>
            <div class="block-info">${triviaContent}</div>
          </div>
          
          <div class="entry-block">
            <div class="block-title">④ 真實照片</div>
            <div class="real-photo-slot">
              ${isLocked ? '🌰 像素圖' : 'JPG [真實照片]'}
            </div>
          </div>
          
          <div class="entry-block">
            <div class="block-title">⑤ 玩家成就</div>
            <div class="block-info">
              成熟次數：${completedPlantsDisplay.innerText}
            </div>
          </div>
        `;
        
        wikiContent.appendChild(entryDiv);
      });
    }

    // 倒數計時核心功能
    function countdown() {
      if (secondsLeft > 0) {
        secondsLeft--;
        displayTime();
      } else {
        // 完成一次番茄鐘
        clearInterval(timerId);
        timerId = null;
        isCounting = false;
        
        // 更新專注次數並存檔
        totalFocusSessions++;
        localStorage.setItem('bloomodoro_focus_sessions', totalFocusSessions);
        
        // 成長動畫與視覺更新
        updateUI();
        plantImg.classList.add('grow-animation'); // 觸發長大動畫

        alert("🎉 太棒了！你完成了一次完美的番茄鐘專注！");
        startBtn.innerText = "⏱️ 開始專注";
      }
    }

    function displayTime() {
      const minutes = Math.floor(secondsLeft / 60);
      const seconds = secondsLeft % 60;
      timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // 按鈕監聽事件
    startBtn.addEventListener('click', () => {
      if (isCounting) {
        // 暫停
        clearInterval(timerId);
        timerId = null;
        isCounting = false;
        startBtn.innerText = "⏱️ 繼續專注";
      } else {
        // 開始
        isCounting = true;
        startBtn.innerText = "⏸️ 暫停";
        timerId = setInterval(countdown, 1000);
      }
    });

    resetBtn.addEventListener('click', () => {
      clearInterval(timerId);
      timerId = null;
      isCounting = false;
      secondsLeft = 1500;
      displayTime();
      startBtn.innerText = "⏱️ 開始專注";
    });

    // Cheat code / 測試按鈕：點擊直接完成一次番茄鐘
    cheatBtn.addEventListener('click', () => {
      secondsLeft = 1;
      countdown();
    });

    // 初始化網頁介面
    updateUI();
  </script>
</body>
</html>
