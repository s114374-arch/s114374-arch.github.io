<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Garden - Bloomodoro</title>
    <style>
        /* ==========================================================================
           🎨 復古 2D 像素遊戲風格樣式表 (Pixel Art UI)
           ========================================================================== */
        :root {
            --bg-color: #4a69bd;       /* 溫馨的復古遊戲藍色背景 */
            --panel-bg: #ffffff;       /* 乾淨的卡片底色 */
            --text-color: #2c3e50;     /* 深色像素邊框與文字顏色 */
            --pixel-green: #2ecc71;    /* 像素綠 */
            --pixel-red: #e74c3c;      /* 像素紅 */
            --pixel-yellow: #f1c40f;   /* 像素黃 */
            --pixel-border: 4px solid #2c3e50; /* 經典 8-bit 厚重黑邊 */
            --solid-shadow: 6px 6px 0px #1e272e; /* 復古實心硬陰影 */
        }

        * {
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace, "Microsoft JhengHei";
            /* 讓文字與邊框線條更具像素顆粒感 */
            image-rendering: pixelated; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 完美還原手稿：標準平面三欄式佈局 */
        .app-container {
            display: grid;
            grid-template-columns: 290px 1fr 330px;
            gap: 20px;
            width: 100%;
            max-width: 1280px;
            height: 85vh;
            min-height: 680px;
        }

        /* 響應式：螢幕太小時自動垂直排列 */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 帶有黑邊與實心陰影的像素卡片 */
        .card {
            background: var(--panel-bg);
            border: var(--pixel-border);
            border-radius: 4px; /* 像素風採用微小圓角或直角 */
            padding: 20px;
            box-shadow: var(--solid-shadow);
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            padding: 12px;
            text-align: center;
            background: #fff;
            border: var(--pixel-border);
            border-radius: 4px;
            box-shadow: var(--solid-shadow);
        }

        /* 📥 左側面板：番茄鐘、統計、音樂 */
        .timer-card {
            text-align: center;
        }

        .timer-card h2 { margin: 0; font-size: 20px; }

        #timer {
            font-size: 56px;
            font-weight: bold;
            color: var(--pixel-red);
            margin: 15px 0;
            text-shadow: 2px 2px 0px #ffdddd;
        }

        .control-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        /* 像素風方塊按鈕 */
        button {
            padding: 10px 22px;
            font-size: 16px;
            font-weight: bold;
            border: var(--pixel-border);
            border-radius: 4px;
            cursor: pointer;
            background: #fff;
            box-shadow: 3px 3px 0px #2c3e50;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        button:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #2c3e50;
        }

        #startBtn { background: var(--pixel-green); color: white; }
        #startBtn.running { background: var(--pixel-yellow); color: #2c3e50; }
        #resetBtn { background: #95a5a6; color: white; }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            font-size: 14px;
            border-bottom: 3px double #cbd5e1; /* 復古雙線條 */
            padding-bottom: 6px;
        }

        .stat-line span:last-child {
            font-weight: bold;
            color: #2980b9;
        }

        .music-card {
            background: #34495e;
            color: #fff;
            text-align: center;
            border: var(--pixel-border);
        }
        .music-title { font-weight: bold; font-size: 16px; }
        .music-sub { font-size: 12px; color: #bdc3c7; margin-top: 4px; }


        /* 🖼️ 中間面板：正視角平面像素房間 (完全按照你的第二張手稿設計) */
        .center-panel {
            background: #f7d794; /* 房間溫馨的像素牆壁顏色 */
            border: var(--pixel-border);
            border-radius: 4px;
            box-shadow: var(--solid-shadow);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 讓家具和窗台落實到地面上 */
            padding: 0;
            overflow: hidden;
        }

        /* 正面大窗戶結構 */
        .pixel-window {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 240px;
            height: 180px;
            border: var(--pixel-border);
            background: #74b9ff; /* 像素藍天 */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .pixel-window::before {
            content: "☁️";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
        }

        /* 橫跨左側的木質多肉窗台 */
        .pixel-window-sill {
            height: 40px;
            background: #cd6133; /* 木頭色 */
            border-top: var(--pixel-border);
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 4px;
        }

        /* 房間地面的盆栽與家具 (對齊你的手繪配置) */
        .room-floor {
            height: 120px;
            background: #b33939; /* 復古紅磚/木地板色 */
            border-top: var(--pixel-border);
            width: 100%;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 30px 10px 30px;
        }

        /* 裝飾品元件 */
        .pixel-furniture {
            font-size: 45px;
            margin-bottom: 5px;
            position: relative;
        }

        /* 主角植物：位於窗台或地面的核心互動盆栽 */
        .main-plant-container {
            position: absolute;
            bottom: 100px;
            right: 80px;
            text-align: center;
        }

        .main-plant-pot {
            font-size: 64px; /* 放大主多肉，讓看清楚成長狀態 */
            display: inline-block;
            transition: transform 0.2s;
        }

        .pot-label {
            background: #2c3e50;
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 5px;
            display: inline-block;
        }

        /* 🎬 像素風動畫 */
        .soil-shake-animation {
            animation: pixelShake 2.5s steps(5) infinite; /* steps 讓動畫有卡頓的像素感 */
        }
        @keyframes pixelShake {
            0%, 100% { transform: scale(1) translate(0, 0); }
            20% { transform: scale(1.1) translate(-4px, -4px); }
            40% { transform: scale(1.1) translate(4px, -4px); }
            60% { transform: scale(1.1) translate(-4px, 4px); }
            80% { transform: scale(1.1) translate(4px, 4px); }
        }

        .leaf-grow-animation {
            animation: pixelGrow 0.8s steps(4);
        }
        @keyframes pixelGrow {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) translateY(-10px); }
            100% { transform: scale(1); }
        }


        /* 📋 右側面板：詳細資訊卡與進度追蹤 */
        .info-card h2 { margin: 0 0 5px 0; font-size: 22px; }
        
        .plant-sub {
            font-style: italic;
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .status-box {
            background: #f8f9fa;
            border: var(--pixel-border);
            padding: 10px;
            margin-bottom: 15px;
        }
        .status-title { font-size: 12px; color: #7f8c8d; }
        .status-value { font-size: 18px; font-weight: bold; }

        .next-box { font-size: 14px; margin-bottom: 15px; line-height: 1.6; }
        .highlight { font-weight: bold; color: #27ae60; }

        /* 像素風硬邊進度條 */
        .progress-bar-container {
            background: #e2e8f0;
            border: var(--pixel-border);
            height: 24px;
            overflow: hidden;
            margin-bottom: 6px;
            position: relative;
        }
        .progress-bar {
            background: var(--pixel-green);
            height: 100%;
            width: 0%;
            transition: width 0.3s steps(10); /* 像素級跳動進度 */
        }
        .progress-ratio { text-align: right; font-size: 12px; font-weight: bold; }

        /* 右下角：成長階段追蹤列表 */
        .timeline-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .timeline-list li {
            padding: 8px 12px;
            margin-bottom: 6px;
            color: #cbd5e1;
            font-size: 14px;
            border: 2px solid transparent;
        }
        .timeline-list li.active {
            color: var(--text-color);
            background: #e8f8f5;
            border: var(--pixel-border);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="app-container">
        
        <div class="panel left-panel">
            <div class="brand">🍅 Pixel Garden</div>
            
            <div class="card timer-card">
                <h2>番茄鐘</h2>
                <div id="timer">25:00</div>
                <div class="control-btns">
                    <button id="startBtn">開始</button>
                    <button id="resetBtn">重置</button>
                </div>
            </div>
            
            <div class="card stats-card">
                <h3>專注數據統計</h3>
                <div class="stat-line"><span>總番茄鐘</span><span id="totalPomodoros">0 個</span></div>
                <div class="stat-line"><span>總專注時間</span><span id="totalFocusTime">0 分鐘</span></div>
                <div class="stat-line"><span>完成植物數</span><span id="completedPlants">0 盆</span></div>
            </div>
            
            <div class="card music-card">
                <div class="music-title">🎵 lofi beats</div>
                <div class="music-sub">chill & relax</div>
            </div>
        </div>

        <div class="panel center-panel">
            <div class="pixel-window">
                <div class="pixel-window-sill">
                    <div class="pixel-furniture" style="font-size: 24px;">🌵</div>
                    <div class="pixel-furniture" style="font-size: 24px;">🌿</div>
                    <div class="pixel-furniture" style="font-size: 24px;">🌸</div>
                </div>
            </div>

            <div class="main-plant-container">
                <div id="plantEmoji" class="main-plant-pot">🌰</div>
                <br>
                <div class="pot-label">熊童子</div>
            </div>

            <div class="room-floor">
                <div class="pixel-furniture">📚 <span style="font-size: 14px; background:#fff; border:2px solid #000; padding:2px;">書櫃</span></div>
                <div class="pixel-furniture">🛏️ <span style="font-size: 14px; background:#fff; border:2px solid #000; padding:2px;">床鋪</span></div>
            </div>
        </div>

        <div class="panel right-panel">
            <div class="card info-card">
                <h2 id="plantName">熊童子</h2>
                <div class="plant-sub">Cotyledon tomentosa</div>
                
                <div class="status-box">
                    <div class="status-title">當前狀態</div>
                    <div id="stageText" class="status-value">🌰 種子</div>
                </div>

                <div class="next-box">
                    <div>下一階段：<span id="nextStageText" class="highlight">🌱 萌芽</span></div>
                    <div class="progress-details">還需 <span id="countdownText" class="highlight">1</span> 次番茄鐘</div>
                </div>
                
                <div class="progress-bar-container">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div id="progressText" class="progress-ratio">0 / 10</div>
            </div>

            <div class="card timeline-card">
                <h3>成長階段追蹤</h3>
                <ul class="timeline-list">
                    <li id="step0" class="active">🌰 種子 (0次)</li>
                    <li id="step1">🌱 萌芽 (1次)</li>
                    <li id="step3">🌿 成長 (3次)</li>
                    <li id="step6">🌸 含苞 (6次)</li>
                    <li id="step10">🌺 盛開 (10次)</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // 開發者測試模式控制 (true: 25秒測試版 / false: 25分鐘正式作業版)
        const DEV_MODE = true; 
        const START_TIME = DEV_MODE ? 25 : 1500;

        let timeLeft = START_TIME;
        let isRunning = false;
        let timerInterval = null;

        // DOM 節點快取
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const plantEmoji = document.getElementById('plantEmoji');
        const stageText = document.getElementById('stageText');
        const nextStageText = document.getElementById('nextStageText');
        const countdownText = document.getElementById('countdownText');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        const totalPomodorosDisplay = document.getElementById('totalPomodoros');
        const totalFocusTimeDisplay = document.getElementById('totalFocusTime');
        const completedPlantsDisplay = document.getElementById('completedPlants');

        // 讀取本地獨立快取
        let data = JSON.parse(localStorage.getItem('bloomodoro_v1_flat_data')) || {
            growth: 0,
            totalPomodoros: 0,
            totalFocusTime: 0,
            completedPlants: 0
        };

        // 嚴格對齊最近幾次討論的階段設定（0, 1, 3, 6, 10）
        const stages = [
            { thresh: 0, emoji: '🌰', name: '種子' },
            { thresh: 1, emoji: '🌱', name: '萌芽' },
            { thresh: 3, emoji: '🌿', name: '成長' },
            { thresh: 6, emoji: '🌸', name: '含苞' },
            { thresh: 10, emoji: '🌺', name: '盛開' }
        ];

        function saveStorage() {
            localStorage.setItem('bloomodoro_v1_flat_data', JSON.stringify(data));
        }

        function updateUI() {
            let currentStage = stages[0];
            let nextStage = stages[1];

            // 判斷當前所屬等級
            for (let i = 0; i < stages.length; i++) {
                if (data.growth >= stages[i].thresh) {
                    currentStage = stages[i];
                    nextStage = stages[i + 1] || null;
                }
            }

            // 更新中央像素多肉外觀與右側狀態文字
            plantEmoji.textContent = currentStage.emoji;
            
            if (data.growth === 10) {
                stageText.textContent = `${currentStage.emoji} 已盛開`;
            } else {
                stageText.textContent = `${currentStage.emoji} ${currentStage.name}中`;
            }
            
            // 動態換算下一階剩餘次數
            if (nextStage) {
                nextStageText.textContent = `${nextStage.emoji} ${nextStage.name}`;
                let remaining = nextStage.thresh - data.growth;
                countdownText.textContent = remaining;
            } else {
                nextStageText.textContent = "最高階段";
                countdownText.textContent = "0";
            }

            // 進度條換算
            progressText.textContent = `${data.growth} / 10`;
            const percentage = Math.min((data.growth / 10) * 100, 100);
            progressBar.style.width = `${percentage}%`;

            // 數據統計看板
            totalPomodorosDisplay.textContent = `${data.totalPomodoros} 個`;
            totalFocusTimeDisplay.textContent = `${data.totalFocusTime} 分鐘`;
            completedPlantsDisplay.textContent = `${data.completedPlants} 盆`;

            // 更新追蹤清單高亮
            stages.forEach(s => {
                const stepElement = document.getElementById(`step${s.thresh}`);
                if (stepElement) {
                    if (data.growth >= s.thresh) {
                        stepElement.className = "active";
                    } else {
                        stepElement.className = "";
                    }
                }
            });
        }

        function renderTimer() {
            let mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            let secs = String(timeLeft % 60).padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
        }

        startBtn.onclick = () => {
            if (isRunning) {
                isRunning = false;
                startBtn.textContent = "開始";
                startBtn.classList.remove('running');
                clearInterval(timerInterval);
            } else {
                isRunning = true;
                startBtn.textContent = "暫停";
                startBtn.classList.add('running');
                timerInterval = setInterval(handleTick, 1000);
            }
        };

        resetBtn.onclick = () => {
            isRunning = false;
            clearInterval(timerInterval);
            startBtn.textContent = "開始";
            startBtn.classList.remove('running');
            timeLeft = START_TIME;
            renderTimer();
        };

        function handleTick() {
            if (!isRunning) return;
            timeLeft--;
            
            if (timeLeft <= 0) {
                timeLeft = START_TIME;
                
                let initialGrowth = data.growth;
                data.growth++;
                data.totalPomodoros++;
                data.totalFocusTime += DEV_MODE ? 1 : 25;

                isRunning = false;
                clearInterval(timerInterval);
                startBtn.textContent = "開始";
                startBtn.classList.remove('running');

                // 觸發像素風生長動畫
                if (initialGrowth === 0 && data.growth === 1) {
                    // 種子到萌芽：劇烈晃動
                    plantEmoji.className = 'main-plant-pot soil-shake-animation';
                    setTimeout(() => {
                        plantEmoji.className = 'main-plant-pot';
                        executeNotification();
                    }, 2500);
                } else {
                    // 後續升級：像素彈跳長大
                    plantEmoji.className = 'main-plant-pot leaf-grow-animation';
                    setTimeout(() => {
                        plantEmoji.className = 'main-plant-pot';
                        executeNotification();
                    }, 800);
                }
                
                saveStorage();
                updateUI();
                renderTimer();
            }
            renderTimer();
        }

        function executeNotification() {
            if (data.growth >= 10) {
                alert('🎉 恭喜！你的熊童子已順利達到最終階段【🌺 盛開】！已為你記入完成盆數，點擊確定即可重新播種。');
                data.completedPlants++;
                data.growth = 0; // 循環重製
                saveStorage();
                updateUI();
            } else {
                alert('🔔 叮咚！完成一次番茄鐘，多肉植物獲得了像素專注養分 🌱！');
            }
        }

        // 初始化
        updateUI();
        renderTimer();
    </script>
</body>
</html>
