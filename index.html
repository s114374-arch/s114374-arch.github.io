<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomodoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🌱 Bloomodoro</h1>
    <button class="settings-btn">⚙️</button>
</header>

<main>

    <!-- 左側：番茄鐘 -->
    <section class="timer-panel">

        <div class="timer-card">
            <h2>專注時間</h2>

            <div class="timer">
                25:00
            </div>

            <button class="start-btn">
                開始專注
            </button>
        </div>

        <div class="stats-card">
            <h3>今日</h3>
            <p>3 次番茄鐘</p>

            <h3>累積</h3>
            <p>128 次</p>

            <p>64 小時</p>
        </div>

    </section>

    <!-- 中間：房間 -->
    <section class="room-panel">

        <div class="room">

            <img
                class="room-bg"
                src="assets/room/room.png"
                alt="room"
            >

            <div class="window-sill">

                <div class="plant-slot" id="plant1">
                    <img src="assets/plants/bearpaw/stage1.png">
                </div>

                <div class="plant-slot">
                    <img src="assets/plants/companion1.png">
                </div>

                <div class="plant-slot">
                    <img src="assets/plants/companion2.png">
                </div>

            </div>

        </div>

    </section>

    <!-- 右側：圖鑑 -->
    <section class="guide-panel">

        <button class="guide-toggle">
            📖
        </button>

    </section>

</main>

<!-- 資訊卡 -->
<div class="plant-info-card">

    <h2>🧸 熊童子</h2>

    <p class="status">
        🌱 萌芽中
    </p>

    <p>
        看起來快長出新葉子了 ✨
    </p>

    <button>
        查看詳細資訊
    </button>

</div>

<!-- 音樂列 -->
<footer>

    <button>🎵 Lo-fi</button>

    <button>🌧 Rain</button>

    <button>🌲 Forest</button>

    <button>☕ Cafe</button>

    <button>🎹 Piano</button>

</footer>

<script src="script.js"></script>

</body>
</html>
